<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B9FFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#5F6FFF" stop-opacity="1"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer diamond -->
  <polygon points="16,2 30,16 16,30 2,16" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Inner diamond cutout -->
  <polygon points="16,8 24,16 16,24 8,16" fill="#060609"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3" fill="#5F6FFF"/>
</svg>
